<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumb AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="chat-container">
        <header class="chat-header">
            <div class="ai-avatar">
                <div class="ai-avatar-inner"></div>
            </div>
            <div class="header-info">
                <h1>Dumb AI</h1>
                <p>Always online</p>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="message-content">
                    <p>Hello. Ask me whatever is on your mind.</p>
                </div>
            </div>
        </main>

        <form class="chat-input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required>
            <button type="submit" id="send-btn" aria-label="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
